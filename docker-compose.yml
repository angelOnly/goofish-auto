x-app-build: &app-build
  context: .
  dockerfile_inline: |
    FROM python:3.12-slim

    ENV PYTHONDONTWRITEBYTECODE=1 \
        PYTHONUNBUFFERED=1

    WORKDIR /app

    COPY requirements.txt /tmp/requirements.txt
    RUN pip install --no-cache-dir -r /tmp/requirements.txt

    COPY . /app

    RUN mkdir -p /app/output

    EXPOSE 8765

services:
  pipeline:
    image: goofish-auto:local
    build: *app-build
    container_name: goofish-auto
    restart: unless-stopped
    command: ["python", "cli.py", "serve", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    volumes:
      - /home/jzb/docker/goofish-auto/output:/app/output
    environment:
      PIPELINE_HOST: 0.0.0.0
      PIPELINE_PORT: "8765"
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-}
      GOOFISH_API_BASE_URL: ${GOOFISH_API_BASE_URL:-https://goofish.xiaolicloud.cn:18443}
      GOOFISH_API_TOKEN: ${GOOFISH_API_TOKEN:-}
      GOOFISH_API_TIMEOUT: ${GOOFISH_API_TIMEOUT:-30}
      GOOFISH_POLL_SECONDS: ${GOOFISH_POLL_SECONDS:-2}
      GOOFISH_MAX_WAIT_SECONDS: ${GOOFISH_MAX_WAIT_SECONDS:-1800}
      THEITZY_COOKIE: ${THEITZY_COOKIE:-}

  # One-shot task bootstrap. It is behind a profile so a normal `up -d`
  # does not unexpectedly call the remote task API.
  goofish-bootstrap:
    image: goofish-auto:local
    build: *app-build
    profiles: ["bootstrap"]
    command: ["python", "cli.py", "goofish-create", "--config", "/app/goofish_tasks.json", "--start"]
    environment:
      GOOFISH_API_BASE_URL: ${GOOFISH_API_BASE_URL:-https://goofish.xiaolicloud.cn:18443}
      GOOFISH_API_TOKEN: ${GOOFISH_API_TOKEN:-}
      GOOFISH_API_TIMEOUT: ${GOOFISH_API_TIMEOUT:-30}
      GOOFISH_POLL_SECONDS: ${GOOFISH_POLL_SECONDS:-2}
      GOOFISH_MAX_WAIT_SECONDS: ${GOOFISH_MAX_WAIT_SECONDS:-1800}
